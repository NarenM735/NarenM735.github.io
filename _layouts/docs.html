<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | Naren's Blog</title>
  <style>
    /* 1. Base Layout & Typography */
    :root {
      --sidebar-width: 250px;
      --bg-sidebar: #f8fafc;
      --border-color: #e2e8f0;
    }

    body {
      display: grid;
      grid-template-columns: var(--sidebar-width) 1fr var(--sidebar-width);
      height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      color: #333;
      overflow: hidden;
    }

    .sidebar-left, .main-content, .sidebar-right {
      overflow-y: auto;
      padding: 2rem;
    }

    .sidebar-left { background: var(--bg-sidebar); border-right: 1px solid var(--border-color); }
    .sidebar-right { background: var(--bg-sidebar); border-left: 1px solid var(--border-color); font-size: 0.9rem; }
    
    .main-content {
      padding: 2rem 4rem;
      line-height: 1.6;
      max-width: 100%;
    }

    /* 2. Responsive Enhancements */
    a { color: #0366d6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    ul { list-style-type: none; padding-left: 0; }
    li { margin-bottom: 0.5rem; }

    /* Ensure images and tables don't break layout */
    img { max-width: 100%; height: auto; }
    
    /* Make HTML tables responsive */
    table {
      display: block;
      width: 100%;
      overflow-x: auto;
      border-collapse: collapse;
      margin: 1.5rem 0;
    }

    /* 3. Media Queries */
    
    /* Mid-size: Hide right sidebar */
    @media (max-width: 1100px) {
      body { grid-template-columns: var(--sidebar-width) 1fr; }
      .sidebar-right { display: none; }
      .main-content { padding: 2rem 3rem; }
    }

    /* Mobile: Stack everything */
    @media (max-width: 768px) {
      body {
        display: block; /* Disable grid */
        height: auto;
        overflow-y: auto;
      }
      .sidebar-left, .main-content {
        padding: 1.5rem;
        width: auto;
        overflow-y: visible;
      }
      .sidebar-left {
        border-right: none;
        border-bottom: 1px solid var(--border-color);
      }
      .main-content {
        padding: 1rem;
      }
      h1 { font-size: 1.8rem; }
    }
  </style>
</head>
<body>

  <nav class="sidebar-left">
    <h3>All Topics</h3>
    <ul>
      {% for post in site.posts %}
        <li><a href="{{ post.url }}">{{ post.title }}</a></li>
      {% endfor %}
    </ul>
  </nav>

  <main class="main-content" id="blog-content">
    <h1>{{ page.title }}</h1>
    <p><em>Published on {{ page.date | date: "%B %d, %Y" }}</em></p>
    <hr>
    {{ content }}
  </main>

  <aside class="sidebar-right">
    <h3>On this page</h3>
    <ul id="dynamic-toc"></ul>
  </aside>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const content = document.getElementById('blog-content');
      const toc = document.getElementById('dynamic-toc');
      const headings = content.querySelectorAll('h2, h3');

      headings.forEach(heading => {
        // Jekyll usually generates IDs automatically, but just in case:
        if (!heading.id) {
          heading.id = heading.innerText.toLowerCase().replace(/[^a-z0-9]+/g, '-');
        }

        const li = document.createElement('li');
        // Indent h3 tags to show hierarchy
        if (heading.tagName === 'H3') {
          li.style.paddingLeft = '1rem';
        }

        const a = document.createElement('a');
        a.href = `#${heading.id}`;
        a.innerText = heading.innerText;

        li.appendChild(a);
        toc.appendChild(li);
      });
    });
  </script>

</body>
</html>
